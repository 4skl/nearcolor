<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSS Color Finder (NearColor)</title>
<style>
  body { font-family: Arial, sans-serif; text-align: center; padding: 1.5rem; background: #fff; color: #111; }
  input[type=text] { font-size: 1.3rem; padding: 0.4em 0.7em; border-radius: 6px; border: 1px solid #aaa; width: 16rem; }
  input[type=number] { font-size: 1rem; width: 3.5rem; padding: 0.3em; border-radius: 6px; border: 1px solid #aaa; }
  select { font-size: 1rem; padding: 0.3em; border-radius: 6px; border: 1px solid #aaa; }
  .row { margin: 0.5rem 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
  label { font-size: 0.9rem; color: #555; }
  #swatches { margin-top: 2rem; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  
  /* Updated swatch styling to accommodate two lines */
  .swatch { 
    padding: 0.6em 1em; 
    border-radius: 6px; 
    cursor: pointer; 
    font-size: 0.9rem; 
    border: 1px solid rgba(0,0,0,0.15); 
    transition: transform 0.1s;
    display: flex;
    flex-direction: column;
    line-height: 1.2;
  }
  .swatch small { opacity: 0.8; font-size: 0.75rem; font-weight: bold; margin-top: 2px; }
  .swatch:hover { transform: scale(1.05); }
  
  /* Styling for the main hex display next to input */
  #hexDisplay { font-family: monospace; font-weight: bold; color: #666; width: 5rem; text-align: left; }
</style>
</head>
<body>
<h2>CSS Color Finder (NearColor)</h2>

<div class="row">
  <input type="text" id="colorInput" placeholder="e.g. cornflowerblue" oninput="update()">
  <span id="hexDisplay"></span>
</div>
<div class="row">
  <label>Nearest colors:</label>
  <input type="number" id="count" min="1" max="145" value="5" oninput="update()">
  <label>Distance:</label>
  <select id="metric" oninput="update()">
    <option value="sq">Squared</option>
    <option value="abs">Absolute</option>
  </select>
</div>
<div id="swatches"></div>

<script>
// (Color object remains the same)
const colors = {"aliceblue":[240,248,255],"antiquewhite":[250,235,215],"aqua":[0,255,255],"aquamarine":[127,255,212],"azure":[240,255,255],"beige":[245,245,220],"bisque":[255,228,196],"black":[0,0,0],"blanchedalmond":[255,235,205],"blue":[0,0,255],"blueviolet":[138,43,226],"brown":[165,42,42],"burlywood":[222,184,135],"cadetblue":[95,158,160],"chartreuse":[127,255,0],"chocolate":[210,105,30],"coral":[255,127,80],"cornflowerblue":[100,149,237],"cornsilk":[255,248,220],"crimson":[220,20,60],"cyan":[0,255,255],"darkblue":[0,0,139],"darkcyan":[0,139,139],"darkgoldenrod":[184,134,11],"darkgray":[169,169,169],"darkgreen":[0,100,0],"darkgrey":[169,169,169],"darkkhaki":[189,183,107],"darkolivegreen":[85,107,47],"darkorange":[255,140,0],"darkorchid":[153,50,204],"darkred":[139,0,0],"darksalmon":[233,150,122],"darkseagreen":[143,188,143],"darkslateblue":[72,61,139],"darkslategray":[47,79,79],"darkslategrey":[47,79,79],"darkturquoise":[0,206,209],"darkviolet":[148,0,211],"deeppink":[255,20,147],"deepskyblue":[0,191,255],"dimgray":[105,105,105],"dimgrey":[105,105,105],"dodgerblue":[30,144,255],"firebrick":[178,34,34],"floralwhite":[255,250,240],"forestgreen":[34,139,34],"fuchsia":[255,0,255],"gainsboro":[220,220,220],"ghostwhite":[248,248,255],"gold":[255,215,0],"goldenrod":[218,165,32],"gray":[128,128,128],"green":[0,128,0],"greenyellow":[173,255,47],"grey":[128,128,128],"honeydew":[240,255,240],"hotpink":[255,105,180],"indianred":[205,92,92],"indigo":[75,0,130],"ivory":[255,255,240],"khaki":[240,230,140],"lavender":[230,230,250],"lavenderblush":[255,240,245],"lawngreen":[124,252,0],"lemonchiffon":[255,250,205],"lightblue":[173,216,230],"lightcoral":[240,128,128],"lightcyan":[224,255,255],"lightgoldenrodyellow":[250,250,210],"lightgray":[211,211,211],"lightgreen":[144,238,144],"lightgrey":[211,211,211],"lightpink":[255,182,193],"lightsalmon":[255,160,122],"lightseagreen":[32,178,170],"lightskyblue":[135,206,250],"lightslategray":[119,136,153],"lightslategrey":[119,136,153],"lightsteelblue":[176,196,222],"lightyellow":[255,255,224],"lime":[0,255,0],"limegreen":[50,205,50],"linen":[250,240,230],"magenta":[255,0,255],"maroon":[128,0,0],"mediumaquamarine":[102,205,170],"mediumblue":[0,0,205],"mediumorchid":[186,85,211],"mediumpurple":[147,112,219],"mediumseagreen":[60,179,113],"mediumslateblue":[123,104,238],"mediumspringgreen":[0,250,154],"mediumturquoise":[72,209,204],"mediumvioletred":[199,21,133],"midnightblue":[25,25,112],"mintcream":[245,255,250],"mistyrose":[255,228,225],"moccasin":[255,228,181],"navajowhite":[255,222,173],"navy":[0,0,128],"oldlace":[253,245,230],"olive":[128,128,0],"olivedrab":[107,142,35],"orange":[255,165,0],"orangered":[255,69,0],"orchid":[218,112,214],"palegoldenrod":[238,232,170],"palegreen":[152,251,152],"paleturquoise":[175,238,238],"palevioletred":[219,112,147],"papayawhip":[255,239,213],"peachpuff":[255,218,185],"peru":[205,133,63],"pink":[255,192,203],"plum":[221,160,221],"powderblue":[176,224,230],"purple":[128,0,128],"red":[255,0,0],"rosybrown":[188,143,143],"royalblue":[65,105,225],"saddlebrown":[139,69,19],"salmon":[250,128,114],"sandybrown":[244,164,96],"seagreen":[46,139,87],"seashell":[255,245,238],"sienna":[160,82,45],"silver":[192,192,192],"skyblue":[135,206,235],"slateblue":[106,90,205],"slategray":[112,128,144],"slategrey":[112,128,144],"snow":[255,250,250],"springgreen":[0,255,127],"steelblue":[70,130,180],"tan":[210,180,140],"teal":[0,128,128],"thistle":[216,191,216],"tomato":[255,99,71],"turquoise":[64,224,208],"violet":[238,130,238],"wheat":[245,222,179],"white":[255,255,255],"whitesmoke":[245,245,245],"yellow":[255,255,0],"yellowgreen":[154,205,50]};

function parseColor(s) {
  s = s.trim().toLowerCase().replace(/\s/g, '');
  if (colors[s]) return colors[s];
  if (s[0] === '#') {
    const h = s.slice(1);
    if (h.length === 3) return [parseInt(h[0]+h[0],16), parseInt(h[1]+h[1],16), parseInt(h[2]+h[2],16)];
    if (h.length === 6) return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
  }
  return null;
}

// Converts RGB array to #RRGGBB string
function rgbToHex(rgb) {
  return '#' + rgb.map(x => x.toString(16).padStart(2, '0')).join('').toUpperCase();
}

function dist(a, b, sq) {
  return sq
    ? (a[0]-b[0])**2 + (a[1]-b[1])**2 + (a[2]-b[2])**2
    : Math.abs(a[0]-b[0]) + Math.abs(a[1]-b[1]) + Math.abs(a[2]-b[2]);
}

function findNearest(rgb, count, sq) {
  return Object.entries(colors)
    .map(([name, c]) => [dist(rgb, c, sq), name])
    .filter(([d]) => d > 0)
    .sort((a, b) => a[0] - b[0])
    .slice(0, count)
    .map(([, n]) => n);
}

function luminance(r, g, b) { return 0.299*r + 0.587*g + 0.114*b; }

function update() {
  const inp = document.getElementById('colorInput');
  const hexDisp = document.getElementById('hexDisplay');
  const rgb = parseColor(inp.value);
  const count = Math.max(1, parseInt(document.getElementById('count').value) || 5);
  const sq = document.getElementById('metric').value === 'sq';
  const swatches = document.getElementById('swatches');

  if (!rgb) { 
    inp.style.background = ''; 
    inp.style.color = ''; 
    hexDisp.innerText = '';
    swatches.innerHTML = ''; 
    return; 
  }
  
  const currentHex = rgbToHex(rgb);
  inp.style.background = currentHex;
  inp.style.color = luminance(...rgb) > 140 ? '#1a1a1a' : '#f8f8f8';
  hexDisp.innerText = currentHex;

  const nearest = findNearest(rgb, count, sq);
  swatches.innerHTML = nearest.map(name => {
    const rgbVal = colors[name];
    const hexVal = rgbToHex(rgbVal);
    const fg = luminance(...rgbVal) > 140 ? '#1a1a1a' : '#f8f8f8';
    return `
      <span class="swatch" style="background:${name};color:${fg}" onclick="pick('${name}')">
        ${name}
        <small>${hexVal}</small>
      </span>`;
  }).join('');
}

function pick(name) {
  document.getElementById('colorInput').value = name;
  update();
}

const keys = Object.keys(colors);
document.getElementById('colorInput').value = keys[Math.floor(Math.random() * keys.length)];
update();
</script>
</body>
</html>
